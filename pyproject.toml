[tool.ruff]
line-length = 130
target-version = "py39"
exclude = [".git", "__pycache__", "profiles", "nnue"]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line too long — existing code has long lines
    "E701",  # multiple statements on one line — idiomatic sunfish style
    "E711",  # comparison to None — used idiomatically
    "E713",  # test for membership should be `not in`
    "E722",  # bare except
    "E731",  # lambda assignment — used in board setup
    "E741",  # ambiguous variable name (i, l, O) — chess code uses these
    "E401",  # multiple imports on one line
    "E402",  # module-level import not at top
    "F541",  # f-string without placeholders — harmless, noisy
    "F841",  # local variable assigned but never used — false positives in chess code
    "W291",  # trailing whitespace
    "W292",  # no newline at end of file
    "W293",  # whitespace before ':'
    "W605",  # invalid escape sequence — legacy regex patterns in tools/
]

[tool.ruff.lint.per-file-ignores]
"tools/tester.py" = ["F401"]  # vendored utility with conditional imports
"tools/fancy.py" = ["F401"]   # vendored utility
"tests/*" = ["F401"]          # test files often import for side effects
